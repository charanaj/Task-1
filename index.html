<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1>Registration Form</h1>
    <form action="./login.html">
    <input type="text" placeholder="Enter name" name="name" required/><br>
    <input type="email" placeholder="Enter email" name="email" required/><br>
    <input type="password" placeholder="Enter password" name="password" required/><br>
    <input type="password" placeholder="Confirm password" name="cpassword" required/><br>
    <input type="number" placeholder="Enter phone number" name="phone" required/><br>
    <input type="radio" id="gmale" name="gender" value="male"/>
    <label for="gmale">Male</label>
    <input type="radio" id="gfemale" name="gender" value="female"/>
    <label for="gfemale">Female</label>
    <div>
        <select name="education" required>
            <option value="">Select Education</option>
            <option value="10th">10th</option>
            <option value="12th">12th</option>
            <option value="graduate">Graduate</option>
            <option value="post-graduate">Post-Graduate</option>
        </select>
    </div>
    
    <p>Date of Birth:
    <input type="date" name="dob"  required/></p>
    <input type="text" placeholder="Enter city" name="city" required/><br>
    <textarea placeholder="Enter address" name="address" required></textarea><br>
    <button type="submit">Register</button>
    </form>
    </center>
</body>
</html>
